<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="內審PM">
<meta name="theme-color" content="#1A3A5C">
<title>內審項目管理 | Internal Audit PM</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,'PingFang TC','PingFang SC','Noto Sans TC','Microsoft JhengHei',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #d3d1c7;background:#fff;flex-wrap:wrap;gap:8px}
.logo{font-size:14px;font-weight:700;color:#1a3a5c}
.logo-sub{font-size:11px;color:#888780;margin-left:6px}
.topbar-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
/* ── Identity picker ── */
.identity-picker{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid #d3d1c7;border-radius:20px;background:#f8f7f4;cursor:pointer;transition:all .15s}
.identity-picker:hover{background:#f1efe8;border-color:#b4b2a9}
.identity-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.identity-name{font-size:12px;font-weight:600;color:#1a3a5c}
.identity-caret{font-size:9px;color:#888780}
.identity-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #d3d1c7;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:500;min-width:160px;overflow:hidden}
.identity-option{padding:9px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.identity-option:hover{background:#f1efe8}
.identity-option.active{font-weight:700;color:#1a3a5c;background:#EBF4FC}
.identity-wrap{position:relative}
/* ── Project tabs ── */
.proj-tabs{display:flex;gap:4px;overflow-x:auto;padding:8px 16px 0;background:#f1efe8;border-bottom:1px solid #d3d1c7}
.proj-tab{padding:7px 13px;font-size:13px;border-radius:8px 8px 0 0;border:1px solid transparent;cursor:pointer;white-space:nowrap;color:#888780;background:transparent;transition:all .15s}
.proj-tab.active{background:#fff;border-color:#d3d1c7;border-bottom-color:#fff;color:#1a1a1a;font-weight:700}
.proj-tab:hover:not(.active){background:rgba(255,255,255,.6)}
.add-proj-tab{padding:7px 12px;font-size:13px;border-radius:8px 8px 0 0;border:1px dashed #b4b2a9;cursor:pointer;color:#b4b2a9;background:transparent}
/* ── View nav ── */
.view-nav{display:flex;gap:0;background:#fff;border-bottom:2px solid #f1efe8;padding:0 16px;overflow-x:auto}
.vnav-btn{padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;color:#888780;background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.vnav-btn.active{color:#1a3a5c;border-bottom-color:#1a3a5c}
.vnav-btn:hover:not(.active){color:#5f5e5a;background:#f8f7f4}
/* ── Sync bar ── */
.sync-bar{display:flex;align-items:center;gap:8px;padding:5px 16px;font-size:11px;border-bottom:1px solid #eeece6;background:#fafaf8}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-ok .sync-dot{background:#3B6D11}
.sync-warn .sync-dot{background:#BA7517;animation:pulse 1.5s infinite}
.sync-err .sync-dot{background:#A32D2D}
.sync-local .sync-dot{background:#888780}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-text{color:#5f5e5a}
.sync-link{color:#185FA5;cursor:pointer;text-decoration:underline;font-size:11px;background:none;border:none;padding:0}
/* ── Content ── */
.content{padding:16px;display:flex;flex-direction:column;gap:12px}
/* ── Project header ── */
.proj-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px 16px;background:#fff;border:1px solid #d3d1c7;border-radius:12px}
.proj-name{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.proj-dates{font-size:12px;color:#888780}
.stat-progress{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.prog-bar-wrap{width:140px;height:6px;background:#e8e6df;border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;background:#185FA5;transition:width .3s}
.prog-label{font-size:11px;color:#888780}
/* ── Risk badges ── */
.risk-high{background:#FADBD8;color:#A32D2D;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.risk-med{background:#FAEEDA;color:#854F0B;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.risk-low{background:#EAF3DE;color:#3B6D11;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
/* ── Section cards (shared) ── */
.section-card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;overflow:hidden;margin-bottom:10px}
.section-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #d3d1c7;background:#f8f7f4}
.section-head:hover{background:#f1efe8}
.section-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.section-title{font-size:13px;font-weight:700;color:#1a1a1a;flex:1}
.chevron{font-size:10px;color:#b4b2a9;transition:transform .2s;display:inline-block}
.chevron.open{transform:rotate(90deg)}
/* ── Risk view ── */
.risk-section-card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:16px;margin-bottom:10px}
.risk-section-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.risk-summary{font-size:13px;color:#5f5e5a;line-height:1.6;white-space:pre-wrap}
.risk-summary-empty{font-size:13px;color:#b4b2a9;font-style:italic}
.risk-add-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;font-size:13px;color:#b4b2a9;cursor:pointer;border:1px dashed #b4b2a9;border-radius:12px;background:transparent;width:100%}
.risk-add-btn:hover{background:#f1efe8;color:#888780}
/* ── Tasks table ── */
.tasks-table{width:100%;border-collapse:collapse}
.tasks-table th{font-size:11px;font-weight:700;color:#888780;padding:8px 10px;text-align:left;border-bottom:1px solid #d3d1c7;background:#fafaf8}
.tasks-table td{padding:7px 10px;font-size:12px;color:#1a1a1a;border-bottom:1px solid #eeece6;vertical-align:middle}
.tasks-table tr:last-child td{border-bottom:none}
.tasks-table tbody tr:hover td{background:#f8f7f4}
.assignee-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.status-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.s-todo{background:#F1EFE8;color:#5F5E5A}
.s-wip{background:#E6F1FB;color:#185FA5}
.s-review{background:#FAEEDA;color:#854F0B}
.s-done{background:#EAF3DE;color:#3B6D11}
.mini-prog{width:52px;height:4px;background:#e8e6df;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:3px}
.mini-prog-fill{height:100%;border-radius:2px}
.add-task-btn{font-size:11px;color:#b4b2a9;cursor:pointer;border:none;background:none;padding:3px 0}
.add-task-btn:hover{color:#5f5e5a}
/* ── Drag ── */
.drag-handle{cursor:grab;color:#d3d1c7;font-size:14px;padding:0 3px;user-select:none}
.drag-handle:hover{color:#888780}
.tasks-table tr.drag-over td{border-top:2px solid #185FA5}
.tasks-table tr.dragging{opacity:.4}
/* ── Links ── */
.task-link{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#185FA5;background:#E6F1FB;padding:2px 6px;border-radius:10px;text-decoration:none;margin:1px}
.task-link:hover{background:#b5d4f4}
/* ── Gantt ── */
.gantt-container{overflow-x:auto;border:1px solid #d3d1c7;border-radius:12px;background:#fff}
.gantt-header{display:flex;border-bottom:1px solid #d3d1c7;background:#f1efe8}
.gantt-label-col{width:180px;flex-shrink:0;padding:8px 12px;font-size:11px;font-weight:700;color:#888780}
.gantt-months{flex:1;display:flex}
.gantt-month{flex:1;padding:8px 4px;font-size:11px;font-weight:700;color:#888780;text-align:center;border-left:1px solid #d3d1c7}
.gantt-row{display:flex;align-items:center;border-bottom:1px solid #eeece6}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:#f8f7f4}
.gantt-task-label{width:180px;flex-shrink:0;padding:6px 12px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-section-label{width:180px;flex-shrink:0;padding:6px 12px;font-size:11px;font-weight:700;background:#f8f7f4}
.gantt-timeline{flex:1;position:relative;height:28px;display:flex;align-items:center}
.gantt-section-timeline{flex:1;height:28px;background:#f8f7f4}
.gantt-bar{position:absolute;height:13px;border-radius:3px;top:50%;transform:translateY(-50%)}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid #eeece6}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888780}
.legend-dot{width:8px;height:8px;border-radius:2px}
/* ── Findings ── */
.finding-card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.finding-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.finding-num{font-size:11px;font-weight:700;color:#888780;flex-shrink:0;margin-top:2px}
.finding-title{font-size:13px;font-weight:700;color:#1a1a1a;flex:1}
.finding-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:#888780}
.finding-body{font-size:12px;color:#5f5e5a;line-height:1.6;margin-bottom:8px}
.follow-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.fb-pending{background:#FADBD8;color:#A32D2D}
.fb-inprog{background:#FAEEDA;color:#854F0B}
.fb-done{background:#EAF3DE;color:#3B6D11}
.fb-accepted{background:#F1EFE8;color:#5F5E5A}
/* ── Assignments ── */
.assign-card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.assign-card.closed{opacity:.65;border-style:dashed}
.assign-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.assign-title{font-size:13px;font-weight:700;color:#1a1a1a;flex:1}
.assign-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tag-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-all{background:#EEEDFE;color:#533AB7}
/* ── Comments thread ── */
.comment-thread{border-top:1px solid #eeece6;padding-top:10px;margin-top:8px;display:flex;flex-direction:column;gap:6px}
.comment-row{display:flex;gap:8px;align-items:flex-start}
.comment-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.comment-bubble{background:#f8f7f4;border-radius:0 8px 8px 8px;padding:6px 10px;flex:1}
.comment-author{font-size:11px;font-weight:700;color:#1a3a5c}
.comment-ts{font-size:10px;color:#b4b2a9;margin-left:6px}
.comment-text{font-size:12px;color:#1a1a1a;margin-top:2px;white-space:pre-wrap}
.comment-input-row{display:flex;gap:6px;margin-top:8px}
.comment-input{flex:1;padding:7px 10px;font-size:12px;border:1px solid #c8c6be;border-radius:8px;background:#fafaf8;font-family:Arial,sans-serif}
.comment-input:focus{outline:none;border-color:#185FA5}
/* ── Buttons ── */
.btn{padding:7px 14px;font-size:13px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary{background:#1a3a5c;color:#fff;border:none;font-weight:700}
.btn-primary:hover{background:#0e2640}
.btn-secondary{background:#fff;color:#5f5e5a;border:1px solid #b4b2a9}
.btn-secondary:hover{background:#f1efe8}
.btn-danger{background:#fff;color:#A32D2D;border:1px solid #e4a0a0;margin-right:auto}
.btn-danger:hover{background:#fadbd8}
.btn-sm{padding:5px 10px;font-size:12px}
/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(8,16,32,.72);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:16px;padding:24px;width:440px;max-width:96vw;box-shadow:0 24px 64px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.modal-wide{width:560px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;color:#1a3a5c;padding-bottom:12px;border-bottom:2px solid #f1efe8}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:#5f5e5a;margin-bottom:5px;display:block}
.form-hint{font-size:11px;color:#b4b2a9;margin-top:4px}
.form-input{width:100%;padding:9px 11px;font-size:13px;border:1px solid #c8c6be;border-radius:8px;background:#fafaf8;color:#1a1a1a;font-family:inherit;transition:border-color .15s}
.form-input:focus{outline:none;border-color:#185FA5;background:#fff}
.form-textarea{resize:vertical;min-height:80px}
select.form-input{cursor:pointer}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid #f1efe8}
input[type=range]{width:60px;cursor:pointer;accent-color:#185FA5}
/* ── Color picker ── */
.color-picker{display:flex;flex-wrap:wrap;gap:9px;padding:4px 0}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.color-swatch:hover{transform:scale(1.18)}
.color-swatch.selected{border-color:#1a1a1a;transform:scale(1.12);box-shadow:0 0 0 2px #fff,0 0 0 4px #1a1a1a}
/* ── Risk picker ── */
.risk-picker{display:flex;gap:8px}
.risk-opt{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s}
.risk-opt.sel-high{background:#FADBD8;color:#A32D2D;border-color:#A32D2D}
.risk-opt.sel-med{background:#FAEEDA;color:#854F0B;border-color:#854F0B}
.risk-opt.sel-low{background:#EAF3DE;color:#3B6D11;border-color:#3B6D11}
.risk-opt:not(.sel-high):not(.sel-med):not(.sel-low){background:#f1efe8;color:#888780;border-color:#d3d1c7}
.risk-opt:hover{opacity:.8}
/* ── Tag multi-select ── */
.tag-multi{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid #c8c6be;border-radius:8px;background:#fafaf8;min-height:44px}
.tag-opt{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:#f1efe8;color:#5f5e5a;border:1px solid #d3d1c7;transition:all .12s}
.tag-opt.selected{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
/* ── Team ── */
.team-grid{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.team-member-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f8f7f4;border-radius:8px;border:1px solid #eeece6}
.member-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.member-info{flex:1;font-size:13px;font-weight:600}
.member-loc{font-size:11px;color:#888780;margin-left:6px;font-weight:400}
.member-btn{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;font-size:13px;color:#b4b2a9;line-height:1}
.member-btn:hover{background:#eeece6;color:#5f5e5a}
/* ── Setup card ── */
.setup-step{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:50%;background:#1a3a5c;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-body{flex:1}
.step-title{font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.step-desc{font-size:12px;color:#5f5e5a;line-height:1.6}
.step-desc a{color:#185FA5}
.step-desc code{background:#f1efe8;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px}

/* ── Mobile task card (replaces table on small screens) ── */
.task-card-m{padding:12px 14px;border-bottom:1px solid #eeece6;background:#fff}
.task-card-m:last-of-type{border-bottom:none}
.task-card-m:hover{background:#f8f7f4}
.task-card-m-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.task-card-m-name{font-size:13px;font-weight:700;color:#1a1a1a;flex:1;line-height:1.4}
.task-card-m-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;font-size:12px;color:#888780}
.task-card-m-row label{font-size:10px;font-weight:700;color:#b4b2a9;min-width:28px}
.task-card-m-prog{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.task-card-m-prog input[type=range]{flex:1;accent-color:#185FA5}
.task-card-m-links{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.task-card-m-actions{display:flex;gap:10px;padding-top:6px;border-top:1px solid #f1efe8}

/* ═══ MOBILE ═══ */
:root{--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
@media(max-width:768px){
body{-webkit-text-size-adjust:100%}
.topbar{padding:calc(8px + var(--safe-top)) 12px 8px;flex-direction:column;gap:6px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.topbar-logo-row{display:flex;align-items:center;justify-content:space-between}
.topbar-right{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.topbar-right::-webkit-scrollbar{display:none}
.proj-tabs{padding:8px 12px 0;-webkit-overflow-scrolling:touch}
.proj-tab{padding:7px 11px;font-size:12px}
.view-nav{padding:0 10px;-webkit-overflow-scrolling:touch}
.vnav-btn{padding:9px 10px;font-size:11px;flex-shrink:0}
.sync-bar{padding:4px 12px;font-size:10px}
.content{padding:10px 10px calc(10px + var(--safe-bot));gap:10px}
.proj-header{flex-direction:column;gap:8px;padding:12px}
.stat-progress{align-items:flex-start}
.prog-bar-wrap{width:100%}
.section-head{padding:10px 12px}
/* tasks-table now uses JS card renderer on mobile; CSS override no longer needed */
.task-actions-cell{display:flex;gap:10px;margin-top:6px;padding-top:6px;border-top:1px solid #f1efe8}
.modal-overlay{align-items:flex-end;padding:0}
.modal{width:100%!important;max-width:100%!important;border-radius:16px 16px 0 0;padding:20px 16px calc(20px + var(--safe-bot));max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-wide{width:100%!important}
.btn{padding:10px 14px;font-size:14px;min-height:44px}
.btn-sm{padding:8px 12px;font-size:12px;min-height:40px}
.form-input,select.form-input,.comment-input{font-size:16px!important}
textarea.form-input{font-size:16px!important;min-height:80px}
.identity-dropdown{position:fixed;top:auto;bottom:0;left:0;right:0;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.identity-option{padding:14px 20px;font-size:15px}
.gantt-task-label,.gantt-section-label,.gantt-label-col{width:120px;font-size:11px}
.comment-input-row{flex-direction:column;gap:6px}
.comment-input-row button{width:100%}
.tag-opt{padding:8px 12px;font-size:13px;min-height:36px}
.color-swatch{width:34px;height:34px}

/* ═══════════════════════════════════

let projects=[], team=[], currentProject=0, currentView='risk', modalState=null, nextId=8000;
let _showArchived=false;
let _isAdmin=false;
let giteeToken='', giteeOwner='', giteeRepo='', cloudMode=false;

const GITEE_FILE='audit-data.json';

function migrate(p){
  // ensure new fields exist on old data
  if(!p.findings) p.findings=[];
  if(!p.assignments) p.assignments=[];
  if(p.archived===undefined) p.archived=false;
  if(!p.weeklyUpdates) p.weeklyUpdates=[];
  if(!p.members) p.members=[];
  p.sections.forEach(s=>{
    if(!s.riskLevel) s.riskLevel='med';
    if(s.summary===undefined) s.summary='';
    if(!s.milestone) s.milestone='';
    s.tasks.forEach(t=>{
      if(!t.links) t.links=[];
      if(!t.comments) t.comments=[];
      if(!t.subtasks) t.subtasks=[];
    });
  });
  return p;
}

// 不同裝置／瀏覽器各自從 8000 開始計算 id，雲端同步合併後可能撞號；
// 此函式掃描所有資料找出最大編號（避免新 id 再次撞號），並將重複的 id 重新分配。
function fixDuplicateIds(){
  const numOf=raw=>{
    if(typeof raw==='number')return raw;
    if(typeof raw==='string'){const m=raw.match(/(\d+)$/);if(m)return parseInt(m[1],10);}
    return NaN;
  };
  const seen=new Set();
  let max=8000,changed=false;
  const visit=v=>{
    if(Array.isArray(v)){v.forEach(visit);return;}
    if(v&&typeof v==='object'){
      if(v.id!==undefined&&v.id!==null){
        const n=numOf(v.id);
        if(!isNaN(n)&&n>max)max=n;
        if(seen.has(v.id)){
          max++;
          v.id=(typeof v.id==='string')?v.id.replace(/\d+$/,String(max)):max;
          changed=true;
        }
        seen.add(v.id);
      }
      for(const k in v){if(k!=='id')visit(v[k]);}
    }
  };
  visit(projects);visit(team);
  if(max>nextId)nextId=max;
  return changed;
}

function loadLocal(){
  try{
    const p=localStorage.getItem('auditPM_projects');
    const t=localStorage.getItem('auditPM_team');
    projects=p?JSON.parse(p).map(migrate):JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
    team=t?JSON.parse(t):JSON.parse(JSON.stringify(DEFAULT_TEAM));
    giteeToken=localStorage.getItem('auditPM_giteeToken')||'';
    giteeOwner=localStorage.getItem('auditPM_giteeOwner')||'';
    giteeRepo =localStorage.getItem('auditPM_giteeRepo')||'';
    giteeSha  =localStorage.getItem('auditPM_giteeSha')||'';
    cloudMode=!!(giteeToken&&giteeOwner&&giteeRepo);
    if(fixDuplicateIds())saveLocalCache();
  }catch(e){
    projects=JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
    team=JSON.parse(JSON.stringify(DEFAULT_TEAM));
  }
}
function saveLocalCache(){
  try{
    localStorage.setItem('auditPM_projects',JSON.stringify(projects));
    localStorage.setItem('auditPM_team',JSON.stringify(team));
    if(giteeSha&&/^[0-9a-f]{20,}/i.test(giteeSha)) localStorage.setItem('auditPM_giteeSha',giteeSha);
  }catch(e){}
}
function saveGiteeCreds(token,owner,repo){
  giteeToken=token;giteeOwner=owner;giteeRepo=repo;cloudMode=!!(token&&owner&&repo);
  localStorage.setItem('auditPM_giteeToken',token);
  localStorage.setItem('auditPM_giteeOwner',owner);
  localStorage.setItem('auditPM_giteeRepo',repo);
}
function clearGiteeCreds(){
  giteeToken='';giteeOwner='';giteeRepo='';giteeSha='';cloudMode=false;
  ['auditPM_giteeToken','auditPM_giteeOwner','auditPM_giteeRepo','auditPM_giteeSha'].forEach(k=>localStorage.removeItem(k));

/* ═══════════════════════════════════
   GITEE CLOUD SYNC (unchanged)
═══════════════════════════════════ */
function giteeBase(){return`https://gitee.com/api/v5/repos/${encodeURIComponent(giteeOwner)}/${encodeURIComponent(giteeRepo)}/contents/${GITEE_FILE}`;}
function toB64(obj){return btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,0))));}
function fromB64(str){if(!str||typeof str!=='string')throw new Error('fromB64: empty');return JSON.parse(decodeURIComponent(escape(atob(str.replace(/\n/g,'')))));}
function setSyncStatus(state,msg){
  const bar=document.getElementById('sync-bar'),txt=document.getElementById('sync-text');
  if(!bar||!txt)return;
  bar.className='sync-bar sync-'+state;txt.textContent=msg;
  const lnk=bar.querySelector('.sync-link');if(lnk)lnk.style.display=cloudMode?'none':'inline';
}
async function cloudLoad(){
  if(!cloudMode)return false;
  setSyncStatus('warn','正在從 Gitee 載入數據…');
  try{
    const res=await fetch(giteeBase()+'?access_token='+encodeURIComponent(giteeToken));
    if(res.status===404){setSyncStatus('warn','雲端尚無數據，正在初始化…');return await cloudSaveForce();}
    if(!res.ok)throw new Error('HTTP '+res.status+' — '+await res.text());
    const json=await res.json();
    if(Array.isArray(json)){setSyncStatus('warn','雲端尚無數據文件，正在初始化…');return await cloudSaveForce();}
    if(!json||typeof json.content!=='string'||json.content.trim()===''){
      setSyncStatus('warn','雲端文件為空，正在寫入現有數據…');
      if(json&&json.sha)giteeSha=json.sha;return await cloudSaveForce();
    }
    if(json.sha&&/^[0-9a-f]{20,}/i.test(json.sha))giteeSha=json.sha;
    let data;try{data=fromB64(json.content);}catch(e2){setSyncStatus('warn','雲端數據損壞，正在重寫…');return await cloudSaveForce();}
    if(data&&data.projects)projects=data.projects.map(migrate);
    if(data&&data.team)team=data.team;
    if(fixDuplicateIds()){saveLocalCache();await cloudSaveForce();}
    else saveLocalCache();
    setSyncStatus('ok',`Gitee 同步成功 · ${new Date().toLocaleTimeString('zh-HK')}`);
    renderIdentityPicker();return true;
  }catch(e){setSyncStatus('err','載入失敗：'+e.message);addDiagLog('cloudLoad error: '+e.message);return false;}
}
async function _giteeWrite(){
  const body={access_token:giteeToken,content:toB64({projects,team}),message:'audit-pm update'};
  let method='POST';
  if(/^[0-9a-f]{20,}/i.test(giteeSha)){body.sha=giteeSha;method='PUT';}
  return fetch(giteeBase(),{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
}
async function cloudSaveForce(){
  try{
    let res=await _giteeWrite();
    if(res.status===400||res.status===409){
      // sha 過期（其他人或本頁先前的儲存已更新文件）— 重取 sha 後重試一次
      const r=await fetch(giteeBase()+'?access_token='+encodeURIComponent(giteeToken));
      if(r.ok){const j=await r.json();if(j&&j.sha&&/^[0-9a-f]{20,}/i.test(j.sha))giteeSha=j.sha;}
      res=await _giteeWrite();
    }
    if(!res.ok)throw new Error('HTTP '+res.status+' — '+await res.text());
    const json=await res.json();
    giteeSha=json.content?.sha||giteeSha;saveLocalCache();
    setSyncStatus('ok',`已儲存至 Gitee · ${new Date().toLocaleTimeString('zh-HK')}`);return true;
  }catch(e){setSyncStatus('err','儲存失敗：'+e.message);addDiagLog('cloudSaveForce error: '+e.message);return false;}
}
let _saveChain=Promise.resolve();
async function cloudSave(){
  saveLocalCache();if(!cloudMode)return;
  setSyncStatus('warn','儲存中…');
  // 排隊執行，避免多個儲存並行導致 sha 衝突
  _saveChain=_saveChain.then(()=>cloudSaveForce());

let diagLog=[];
function addDiagLog(msg){diagLog.push(`[${new Date().toLocaleTimeString()}] ${msg}`);}
async function runDiagnostics(){
  diagLog=[];const out=document.getElementById('diag-out');if(out)out.textContent='檢測中…';
  addDiagLog('開始診斷');
  addDiagLog(`cloudMode=${cloudMode}, owner="${giteeOwner}", repo="${giteeRepo}", token長度=${giteeToken.length}, sha="${giteeSha}"`);
  try{const r=await fetch('https://gitee.com/api/v5/user?access_token='+encodeURIComponent(giteeToken));const j=await r.json();if(r.ok)addDiagLog('✅ Token 有效，帳號：'+j.login);else addDiagLog('❌ Token 無效：'+r.status);}catch(e){addDiagLog('❌ 無法連接 Gitee：'+e.message);}
  try{const r=await fetch(`https://gitee.com/api/v5/repos/${encodeURIComponent(giteeOwner)}/${encodeURIComponent(giteeRepo)}?access_token=${encodeURIComponent(giteeToken)}`);if(r.ok)addDiagLog('✅ 倉庫存在');else addDiagLog('❌ 倉庫不存在：'+r.status);}catch(e){addDiagLog('❌ 倉庫查詢失敗：'+e.message);}
  try{
    const r=await fetch(giteeBase()+'?access_token='+encodeURIComponent(giteeToken));
    if(r.ok){const j=await r.json();if(Array.isArray(j)){giteeSha='';addDiagLog('⚠️ 目錄列表，文件未建立，正在初始化…');const ok=await cloudSaveForce();if(ok)addDiagLog('✅ 文件已建立！請刷新頁面。');}
    else{const sha=(j&&j.sha&&/^[0-9a-f]{20,}/i.test(j.sha))?j.sha:'';giteeSha=sha;if(sha)addDiagLog('✅ 文件存在，sha='+sha.slice(0,8)+'…');else{addDiagLog('⚠️ sha為空，重新初始化…');const ok=await cloudSaveForce();if(ok)addDiagLog('✅ 重新初始化成功！');}}}
    else if(r.status===404){giteeSha='';addDiagLog('⚠️ 文件不存在，正在建立…');const ok=await cloudSaveForce();if(ok)addDiagLog('✅ 文件已建立！');}
    else addDiagLog('❌ 文件查詢失敗：HTTP '+r.status);
  }catch(e){addDiagLog('❌ 文件查詢異常：'+e.message);}
  addDiagLog('診斷完畢');if(out)out.textContent=diagLog.join('\n');
}

function getProject(){return projects[currentProject];}
function statusObj(k){return STATUSES.find(s=>s.key===k)||STATUSES[0];}
function followObj(k){return FOLLOW_STATUSES.find(s=>s.key===k)||FOLLOW_STATUSES[0];}
function riskObj(k){return RISK_LEVELS.find(r=>r.key===k)||RISK_LEVELS[1];}
function genId(){return ++nextId;}
function overallProgress(p){const ts=p.sections.reduce((a,s)=>a+s.tasks.length,0);if(!ts)return 0;return Math.round(p.sections.reduce((a,s)=>a+s.tasks.reduce((b,t)=>b+t.progress,0),0)/ts);}
function doneTasks(p){return p.sections.reduce((a,s)=>a+s.tasks.filter(t=>t.status==='done').length,0);}
function totalTasks(p){return p.sections.reduce((a,s)=>a+s.tasks.length,0);}
function sectionPct(s){if(!s.tasks.length)return 0;return Math.round(s.tasks.reduce((a,t)=>a+t.progress,0)/s.tasks.length);}
function fmtDate(d){if(!d)return'';const dt=new Date(d);return`${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;}
function fmtTs(ts){const d=new Date(ts);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function memberColor(name){const m=team.find(m=>m.name===name);if(!m)return{bg:'#eee',tc:'#888'};return LOC_COLORS[m.loc]||{bg:'#E8E6F0',tc:'#533AB7'};}
function memberInitials(name){if(!name)return'?';if(/[a-zA-Z]/.test(name)){const pts=name.trim().split(/\s+/);if(pts.length>=2)return(pts[0][0]+pts[pts.length-1][0]).toUpperCase();return pts[0].slice(0,2).toUpperCase();}if(name.length<=2)return name;return name[0]+name[name.length-1];}
function workdays(s,e){let d=new Date(s),end=new Date(e),n=0;while(d<=end){const w=d.getDay();if(w>0&&w<6)n++;d.setDate(d.getDate()+1);}return n;}
function riskBadge(level){const r=riskObj(level);return`<span class="${r.cls.replace('risk-','risk-')}">${r.label}</span>`;}

function calcTaskRisk(t){
  if(t.status==='done')return'none';
  const now=new Date().setHours(0,0,0,0);
  const s=new Date(t.start).setHours(0,0,0,0);
  const e=new Date(t.end).setHours(0,0,0,0);
  if(now>e)return'overdue';
  if(now<=s)return'none';
  const total=e-s;if(!total)return'none';
  const gap=(now-s)/total*100-t.progress;
  if(gap>30)return'high';
  if(gap>15)return'med';
  return'none';
}
function renderSubtaskList(sid,tid,subtasks){
  if(!subtasks||!subtasks.length)return'';
  return`<div class="subtask-list">${subtasks.map(st=>`<div class="subtask-item${st.done?' done-st':''}">
    <input type="checkbox" ${st.done?'checked':''} onclick="toggleSubtask(${sid},${tid},${st.id})">
    <span>${escHtml(st.text)}</span>
  </div>`).join('')}</div>`;
}

/* ═══════════════════════════════════
   GANTT VIEW
═══════════════════════════════════ */
function renderGantt(p){
  const allD=[];p.sections.forEach(s=>s.tasks.forEach(t=>{allD.push(t.start,t.end);}));
  if(!allD.length)return'<div style="padding:24px;color:#888780;font-size:13px">暫無任務</div>';
  const minD=new Date(Math.min(...allD.map(d=>new Date(d))));
  const maxD=new Date(Math.max(...allD.map(d=>new Date(d))));
  minD.setDate(1);maxD.setMonth(maxD.getMonth()+1,0);
  const months=[];let cur=new Date(minD);
  while(cur<=maxD){months.push({y:cur.getFullYear(),m:cur.getMonth()});cur.setMonth(cur.getMonth()+1);}
  const total=(maxD-minD)/86400000+1;
  const pct=d=>Math.max(0,Math.min(100,(new Date(d)-minD)/86400000/total*100));
  let html=`<div class="gantt-container"><div style="min-width:540px">
    <div class="gantt-header">
      <div class="gantt-label-col">任務</div>
      <div class="gantt-months">${months.map(m=>`<div class="gantt-month">${m.y}/${String(m.m+1).padStart(2,'0')}</div>`).join('')}</div>
    </div>`;
  p.sections.forEach(s=>{
    html+=`<div class="gantt-row"><div class="gantt-section-label" style="color:${s.color}">${escHtml(s.name)}</div><div class="gantt-section-timeline"></div></div>`;
    s.tasks.forEach(t=>{
      const l=pct(t.start),w=Math.max(0.8,pct(t.end)-l);
      const op=t.status==='done'?1:t.status==='wip'?.8:.4;
      const wd=workdays(t.start,t.end);
      html+=`<div class="gantt-row">
        <div class="gantt-task-label" title="${escHtml(t.name)} (${escHtml(t.assignee)})">${escHtml(t.name)}</div>
        <div class="gantt-timeline">
          <div class="gantt-bar" style="left:${l}%;width:${w}%;background:${s.color};opacity:${op}"></div>
          <div style="position:absolute;left:calc(${l}% + 4px);top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:#fff;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.4)">${w>3?wd+'d':''}</div>
        </div>
      </div>`;
    });
  });
  html+=`</div><div class="legend">
    ${p.sections.map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div>${escHtml(s.name)}</div>`).join('')}
    ${STATUSES.map(s=>`<div class="legend-item"><div class="legend-dot ${s.cls}" style="border-radius:50%"></div>${s.label}</div>`).join('')}
  </div></div>`;
  return html;
}

/* ═══════════════════════════════════
   FINDINGS VIEW
═══════════════════════════════════ */
function renderFindings(p){
  let html=`<div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="openModal('newFinding')">＋ 新增審計發現</button>
    </div>`;
  if(!p.findings||!p.findings.length){
    html+='<div style="padding:32px;text-align:center;color:#888780;background:#fff;border-radius:12px;border:1px solid #d3d1c7">暫無審計發現記錄</div>';
  } else {
    // Build ordered section list: project sections first (in order), then "其他"
    const sectionOrder=[...p.sections.map(s=>s.name),'其他'];
    // Group findings by sectionName
    const grouped={};
    p.findings.forEach(f=>{
      const key=sectionOrder.includes(f.sectionName)?f.sectionName:'其他';
      if(!grouped[key])grouped[key]=[];
      grouped[key].push(f);
    });
    // Global sequential numbering
    let seqNum=0;
    sectionOrder.forEach(secName=>{
      if(!grouped[secName]||!grouped[secName].length)return;
      // section header
      const secObj=p.sections.find(s=>s.name===secName);
      const dotColor=secObj?secObj.color:'#888780';
      html+=`<div style="display:flex;align-items:center;gap:8px;margin:14px 0 6px;padding-bottom:6px;border-bottom:2px solid #f1efe8">
        <div style="width:9px;height:9px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
        <span style="font-size:13px;font-weight:700;color:#1a3a5c">${escHtml(secName)}</span>
        <span style="font-size:11px;color:#888780">${grouped[secName].length} 項發現</span>
      </div>`;
      grouped[secName].forEach(f=>{
        seqNum++;
        const r=riskObj(f.riskLevel);const fo=followObj(f.followStatus);
        const commentCount=(f.comments||[]).length;
        html+=`<div class="finding-card">
          <div class="finding-top">
            <div class="finding-num">F-${String(seqNum).padStart(3,'0')}</div>
            <div class="finding-title">${escHtml(f.description)}</div>
            <span class="${r.cls}">${r.label}</span>
            <button class="add-task-btn" onclick="openModal('editFinding',${f.id})" style="margin-left:8px">✏️</button>
          </div>
          <div class="finding-meta">
            <span>責任人：${escHtml(f.assignee||'—')}</span>
            <span>|</span><span>整改期限：${f.deadline?fmtDate(f.deadline):'—'}</span>
            <span>|</span><span class="follow-badge ${fo.cls}">${fo.label}</span>
          </div>
          ${f.recommendation?`<div class="finding-body"><strong style="color:#1a3a5c">建議：</strong>${escHtml(f.recommendation)}</div>`:''}
          ${f.mgmtReply?`<div class="finding-body"><strong style="color:#854F0B">管理層回覆：</strong>${escHtml(f.mgmtReply)}</div>`:''}
          <button class="add-task-btn" onclick="openModal('findingComments',${f.id})" style="color:${commentCount>0?'#185FA5':'#b4b2a9'}">
            💬 跟進留言${commentCount>0?` (${commentCount})`:''}</button>
        </div>`;
      });
    });
  }
  html+='</div>';
  return html;
}

      <button class="btn btn-primary btn-sm" onclick="openModal('newAssignment')">＋ 新增指派任務</button>

  [...open,...closed].forEach(a=>{
    const msgCount=(a.messages||[]).length;
    const tagHtml=a.taggedTo.map(n=>n==='all'?
      `<span class="tag-badge tag-all">@ 全部成員</span>`:
      (()=>{const mc=memberColor(n);return`<span class="tag-badge" style="background:${mc.bg};color:${mc.tc}">@${n}</span>`;})()

          <div style="font-size:11px;color:#888780;margin-top:2px">由 ${escHtml(a.createdBy)} 於 ${fmtTs(a.createdTs)} 創建</div>

  return html;

/* ═══════════════════════════════════
   WORKLOAD VIEW
═══════════════════════════════════ */
function renderWorkload(p){
  const today=new Date();today.setHours(0,0,0,0);
  const memberTasks={};
  team.forEach(m=>{memberTasks[m.name]=[];});
  p.sections.forEach(s=>s.tasks.forEach(t=>{
    if(!memberTasks[t.assignee])memberTasks[t.assignee]=[];
    memberTasks[t.assignee].push({task:t,section:s,risk:calcTaskRisk(t)});
  }));
  const projMembers=(p.members&&p.members.length>0)?p.members:team.map(m=>m.name);
  const sorted=[...team].filter(m=>projMembers.includes(m.name)).sort((a,b)=>(memberTasks[b.name]||[]).length-(memberTasks[a.name]||[]).length);
  let html='<div>';
  sorted.forEach(m=>{
    const items=memberTasks[m.name]||[];
    const done=items.filter(x=>x.task.status==='done').length;
    const wip=items.filter(x=>x.task.status==='wip').length;
    const overdue=items.filter(x=>x.risk==='overdue').length;
    const highRisk=items.filter(x=>x.risk==='high').length;
    const mc=memberColor(m.name);
    const avgProg=items.length?Math.round(items.reduce((a,x)=>a+x.task.progress,0)/items.length):0;
    html+=`<div class="workload-card">
      <div class="workload-header">
        <div class="member-avatar" style="background:${mc.bg};color:${mc.tc};width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${memberInitials(m.name)}</div>
        <div style="min-width:80px"><div style="font-size:14px;font-weight:700;color:#1a1a1a">${escHtml(m.name)}</div><div style="font-size:11px;color:#888780">${escHtml(m.loc)}</div></div>
        <div class="workload-stats">
          <span style="color:#888780">📋 ${items.length} 任務</span>
          <span style="color:#3B6D11">✓ ${done} 完成</span>
          <span style="color:#185FA5">⟳ ${wip} 進行中</span>
          ${overdue?`<span style="color:#A32D2D;font-weight:700">⚠️ ${overdue} 逾期</span>`:''}
          ${highRisk?`<span style="color:#854F0B">🔴 ${highRisk} 落後</span>`:''}
        </div>
      </div>`;
    if(items.length){
      html+=`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#888780;margin-bottom:3px"><span>平均進度</span><span>${avgProg}%</span></div>
        <div style="height:5px;background:#e8e6df;border-radius:3px;overflow:hidden"><div style="width:${avgProg}%;height:100%;background:${mc.tc||'#185FA5'};border-radius:3px;transition:width .3s"></div></div>
      </div>`;
      html+=items.map(x=>{
        const t=x.task,s=x.section,st=statusObj(t.status);
        const end=new Date(t.end);end.setHours(0,0,0,0);
        const daysLeft=Math.ceil((end-today)/86400000);
        const daysLabel=t.status==='done'?'已完成':daysLeft<0?`逾期 ${Math.abs(daysLeft)}天`:daysLeft===0?'今天截止':`${daysLeft}天後截止`;
        const daysColor=t.status==='done'?'#3B6D11':daysLeft<0?'#A32D2D':daysLeft<=3?'#854F0B':'#888780';
        const riskIcon=x.risk==='overdue'?'⚠️ ':x.risk==='high'?'🔴 ':x.risk==='med'?'🟡 ':'';
        const nameColor=x.risk==='overdue'||x.risk==='high'?'#A32D2D':x.risk==='med'?'#854F0B':'#1a1a1a';
        return`<div class="workload-task-row">
          <div style="width:9px;height:9px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
          <div style="flex:1;overflow:hidden">
            <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${nameColor}">${riskIcon}${escHtml(t.name)}</div>
            <div style="font-size:11px;color:#888780">${escHtml(s.name)}</div>
          </div>
          <span class="status-badge ${st.cls}" style="cursor:default;flex-shrink:0">${st.label}</span>
          <span style="font-size:11px;color:${daysColor};white-space:nowrap;flex-shrink:0">${daysLabel}</span>
          <div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
            <div class="mini-prog"><div class="mini-prog-fill" style="width:${t.progress}%;background:${s.color}"></div></div>
            <span style="font-size:11px;color:#888780">${t.progress}%</span>
          </div>
        </div>`;
      }).join('');
    } else {
      html+=`<div style="padding:10px 0;font-size:12px;color:#b4b2a9;text-align:center">暫無分配任務</div>`;
    }
    html+='</div>';
  });
  if(!team.length)html+='<div style="padding:32px;text-align:center;color:#888780;background:#fff;border-radius:12px;border:1px solid #d3d1c7">請先在「管理成員」中新增團隊成員</div>';
  html+='</div>';
  return html;
}

function renderCommentThread(comments, type, parentId){
  let html='<div class="comment-thread">';
  const REACT_EMOJIS=['👍','✅','❓','⚠️','🔄'];
  const cur2=currentUser();
  comments.forEach(c=>{
    const mc=memberColor(c.author);
    const reactions=c.reactions||{};
    const reactionHtml=`<div class="reaction-row">
      ${REACT_EMOJIS.map(e=>{
        const users=reactions[e]||[];
        if(!users.length)return`<button class="reaction-btn ghost" onclick="reactToComment('${type}',${parentId},${c.id},'${e}')" title="新增 ${e}">${e}</button>`;
        const reacted=users.includes(cur2);
        return`<button class="reaction-btn${reacted?' reacted':''}" onclick="reactToComment('${type}',${parentId},${c.id},'${e}')" title="${escHtml(users.join(', '))}">${e} ${users.length}</button>`;
      }).join('')}
    </div>`;
    html+=`<div class="comment-row">
      <div class="comment-avatar" style="background:${mc.bg};color:${mc.tc}">${memberInitials(c.author)}</div>
      <div class="comment-bubble">
        <span class="comment-author">${escHtml(c.author)}</span>
        <span class="comment-ts">${fmtTs(c.ts)}</span>
        <div class="comment-text">${escHtml(c.text)}</div>
        ${reactionHtml}
      </div>
    </div>`;
  });
  // Input row — auto-uses current identity, still allows per-comment override
  const cur=currentUser();const mc2=memberColor(cur);
  const memberOpts=team.map(m=>`<option value="${escHtml(m.name)}" ${m.name===cur?'selected':''}>${escHtml(m.name)}</option>`).join('');
  html+=`<div style="margin-top:8px">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <div class="identity-avatar" style="background:${mc2.bg};color:${mc2.tc};width:20px;height:20px;flex-shrink:0">${memberInitials(cur)}</div>
      <select class="comment-input" id="ca-${type}-${parentId}" style="flex:0 0 auto;width:auto;padding:4px 8px;font-size:12px;border-radius:20px">${memberOpts}</select>
    </div>
    <div class="comment-input-row">
      <input class="comment-input" id="ci-${type}-${parentId}" placeholder="留言… (Enter 發送)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postComment('${type}',${parentId});}">
      <button class="btn btn-primary btn-sm" onclick="postComment('${type}',${parentId})">發送</button>
    </div>
  </div></div>`;
  return html;
}

function reactToComment(type,parentId,commentId,emoji){
  const user=currentUser();const p=getProject();let comment=null;
  if(type==='assignment'){const a=p.assignments.find(a=>a.id===parentId);if(a)comment=(a.messages||[]).find(c=>c.id===commentId);}
  else if(type==='finding'){const f=p.findings.find(f=>f.id===parentId);if(f)comment=(f.comments||[]).find(c=>c.id===commentId);}
  else if(type==='task'){p.sections.forEach(s=>s.tasks.forEach(t=>{if(t.id===parentId)(t.comments||[]).forEach(c=>{if(c.id===commentId)comment=c;});}));}
  if(!comment)return;
  if(!comment.reactions)comment.reactions={};
  if(!comment.reactions[emoji])comment.reactions[emoji]=[];
  const idx=comment.reactions[emoji].indexOf(user);
  if(idx>=0)comment.reactions[emoji].splice(idx,1);else comment.reactions[emoji].push(user);
  cloudSave();
  if(type==='task')openModal('taskComments',modalState&&modalState.sid,parentId);
  else if(type==='finding')openModal('findingComments',parentId);
  else renderContent();
}

/* ═══════════════════════════════════
   ACTIONS
═══════════════════════════════════ */
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return escHtml(s);}

function cycleStatus(sid,tid){
  const s=getProject().sections.find(s=>s.id===sid);const t=s&&s.tasks.find(t=>t.id===tid);if(!t)return;
  const idx=STATUSES.findIndex(s=>s.key===t.status);t.status=STATUSES[(idx+1)%STATUSES.length].key;
  if(t.status==='done')t.progress=100;if(t.status==='todo')t.progress=0;
  cloudSave();renderContent();
}
function updateProgress(sid,tid,val){
  const s=getProject().sections.find(s=>s.id===sid);const t=s&&s.tasks.find(t=>t.id===tid);if(!t)return;
  t.progress=parseInt(val);t.status=t.progress===100?'done':t.progress>0?'wip':'todo';
  cloudSave();renderContent();
}
function toggleAssignment(aid){
  const a=getProject().assignments.find(a=>a.id===aid);if(!a)return;a.closed=!a.closed;cloudSave();renderContent();
}

function postComment(type, parentId){
  const inp=document.getElementById(`ci-${type}-${parentId}`);if(!inp||!inp.value.trim())return;
  const text=inp.value.trim();const p=getProject();
  const authorSel=document.getElementById(`ca-${type}-${parentId}`);
  const author=authorSel?authorSel.value:currentUser();
  const comment={id:genId(),author,text,ts:Date.now()};
  if(type==='assignment'){
    const a=p.assignments.find(a=>a.id===parentId);if(!a)return;
    if(!a.messages)a.messages=[];a.messages.push(comment);
  } else if(type==='finding'){
    const f=p.findings.find(f=>f.id===parentId);if(!f)return;
    if(!f.comments)f.comments=[];f.comments.push(comment);
    closeModal();
  } else if(type==='task'){
    // Use modalState.sid for precise section→task lookup (prevents wrong-task bug)
    const _sid=Number(modalState&&modalState.sid!=null?modalState.sid:-1);
    const _tid=Number(parentId);
    let found=null;
    if(_sid>=0){
      const _s=p.sections.find(s=>Number(s.id)===_sid);
      if(_s) found=_s.tasks.find(t=>Number(t.id)===_tid)||null;
    }
    // fallback: search all sections (in case modalState is stale)
    if(!found) p.sections.forEach(s=>s.tasks.forEach(t=>{if(Number(t.id)===_tid)found=t;}));
    if(!found)return;
    if(!found.comments)found.comments=[];found.comments.push(comment);
    closeModal();
  }
  cloudSave();renderContent();
}

/* ── Drag-to-reorder ── */
let _dragSid=null,_dragTid=null;
function dragStart(e,sid,tid){_dragSid=sid;_dragTid=tid;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));}
/* touch drag */
let _tEl=null,_tSid=null,_tTid=null;
function initTouchDrag(){document.querySelectorAll('.tasks-table tbody tr[data-sid]').forEach(r=>{r.removeEventListener('touchstart',_tS);r.addEventListener('touchstart',_tS,{passive:false});});}
function _tS(e){if(e.touches.length!==1)return;const r=this;r._tt=setTimeout(()=>{_tEl=r;_tSid=parseInt(r.dataset.sid);_tTid=parseInt(r.dataset.tid);r.classList.add('dragging');navigator.vibrate&&navigator.vibrate(40);document.addEventListener('touchmove',_tM,{passive:false});document.addEventListener('touchend',_tE,{once:true,passive:false});},450);r.addEventListener('touchend',()=>clearTimeout(r._tt),{once:true});r.addEventListener('touchmove',()=>clearTimeout(r._tt),{once:true});}
function _tM(e){if(!_tEl)return;e.preventDefault();const t=e.touches[0];document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));const el=document.elementFromPoint(t.clientX,t.clientY);const tr=el?.closest('tr[data-tid]');if(tr&&tr!==_tEl)tr.classList.add('drag-over');}
function _tE(e){if(!_tEl)return;const t=e.changedTouches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const tgt=el?.closest('tr[data-tid]');document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));_tEl.classList.remove('dragging');if(tgt&&tgt!==_tEl){const sid=parseInt(tgt.dataset.sid),tid=parseInt(tgt.dataset.tid);if(sid===_tSid&&tid!==_tTid){const p=getProject(),s=p.sections.find(s=>s.id===sid);if(s){const fi=s.tasks.findIndex(t=>t.id===_tTid),ti=s.tasks.findIndex(t=>t.id===tid);if(fi>=0&&ti>=0){const[m]=s.tasks.splice(fi,1);s.tasks.splice(ti,0,m);cloudSave();renderContent();}}}}_tEl=null;_tSid=null;_tTid=null;document.removeEventListener('touchmove',_tM);}
function dragDrop(e,targetSid,targetTid){
  e.preventDefault();document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(_dragSid!==targetSid||_dragTid===targetTid)return;
  const s=getProject().sections.find(s=>s.id===_dragSid);if(!s)return;
  const fi=s.tasks.findIndex(t=>t.id===_dragTid);const ti=s.tasks.findIndex(t=>t.id===targetTid);
  if(fi<0||ti<0)return;const[moved]=s.tasks.splice(fi,1);s.tasks.splice(ti,0,moved);
  cloudSave();renderContent();
}

function g(id){const el=document.getElementById(id);return el?el.value:'';}
let _modalDirty=false;
function showModal(html){
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" id="overlay" onclick="overlayClick(event)">${html}</div>`;
  _modalDirty=false;
  document.getElementById('overlay').addEventListener('input',()=>{_modalDirty=true;});
}
function closeModal(){document.getElementById('modal-root').innerHTML='';_modalDirty=false;}
function overlayClick(e){
  if(e.target.id!=='overlay')return;
  if(_modalDirty&&!confirm('尚有未儲存的輸入內容，確定關閉？'))return;
  closeModal();
}

function colorSwatchesHtml(sel){
  return`<div class="color-picker">${COLORS_10.map(c=>`<div class="color-swatch ${c.hex===sel?'selected':''}" style="background:${c.hex}" onclick="selectColor('${c.hex}',this)"></div>`).join('')}</div>
  <input type="hidden" id="m-color" value="${sel||COLORS_10[0].hex}">`;
}
function selectColor(hex,el){document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');document.getElementById('m-color').value=hex;}

function riskPickerHtml(sel){
  sel=sel||'med';
  return`<div class="risk-picker">
    ${RISK_LEVELS.map(r=>`<div class="risk-opt ${sel===r.key?'sel-'+r.key:''}" onclick="selectRisk('${r.key}',this)">${r.label}</div>`).join('')}
  </div><input type="hidden" id="m-risk" value="${sel}">`;
}
function selectRisk(key,el){
  document.querySelectorAll('.risk-opt').forEach(o=>o.className='risk-opt');
  el.classList.add('sel-'+key);document.getElementById('m-risk').value=key;
}

function teamOptions(sel){return team.map(m=>`<option value="${escHtml(m.name)}" ${m.name===sel?'selected':''}>${escHtml(m.name)}（${escHtml(m.loc)}）</option>`).join('');}

function projectTeamOptions(sel){
  const p=getProject();const members=(p&&p.members&&p.members.length>0)?p.members:team.map(m=>m.name);
  return team.filter(m=>members.includes(m.name)).map(m=>`<option value="${escHtml(m.name)}" ${m.name===sel?'selected':''}>${escHtml(m.name)}（${escHtml(m.loc)}）</option>`).join('');
}
function projMemberMultiHtml(selected){
  if(!team.length)return'<div style="color:#b4b2a9;font-size:12px">請先在「管理成員」中新增團隊成員</div>';
  let html=`<div class="tag-multi" id="proj-member-multi">`;
  team.forEach(m=>{html+=`<div class="tag-opt ${selected.includes(m.name)?'selected':''}" onclick="this.classList.toggle('selected')" data-val="${escHtml(m.name)}">${escHtml(m.name)}</div>`;});
  html+='</div>';return html;
}
function getProjMembers(){return[...document.querySelectorAll('#proj-member-multi .tag-opt.selected')].map(o=>o.dataset.val);}
function projectTagMultiHtml(selected){
  const p=getProject();const members=(p&&p.members&&p.members.length>0)?p.members:team.map(m=>m.name);
  const allSel=selected.includes('all');
  let html=`<div class="tag-multi" id="tag-multi"><div class="tag-opt ${allSel?'selected':''}" onclick="toggleTag(this.dataset.val,this)" data-val="all">@ 全部成員</div>`;
  team.filter(m=>members.includes(m.name)).forEach(m=>{html+=`<div class="tag-opt ${selected.includes(m.name)?'selected':''}" onclick="toggleTag(this.dataset.val,this)" data-val="${escHtml(m.name)}">${escHtml(m.name)}</div>`;});
  html+='</div>';return html;
}
function tagMultiHtml(selected){
  const allSel=selected.includes('all');
  let html=`<div class="tag-multi" id="tag-multi">
    <div class="tag-opt ${allSel?'selected':''}" onclick="toggleTag(this.dataset.val,this)" data-val="all">@ 全部成員</div>`;
  team.forEach(m=>{html+=`<div class="tag-opt ${selected.includes(m.name)?'selected':''}" onclick="toggleTag(this.dataset.val,this)" data-val="${escHtml(m.name)}">${escHtml(m.name)}</div>`;});
  html+='</div>';return html;
}
function toggleTag(val,el){
  el.classList.toggle('selected');
  if(val==='all'&&el.classList.contains('selected')){document.querySelectorAll('#tag-multi .tag-opt:not([data-val="all"])').forEach(o=>o.classList.remove('selected'));}
  if(val!=='all'&&el.classList.contains('selected')){const allEl=document.querySelector('#tag-multi [data-val="all"]');if(allEl)allEl.classList.remove('selected');}
}
function getTaggedTo(){
  const sel=[...document.querySelectorAll('#tag-multi .tag-opt.selected')].map(o=>o.dataset.val);
  return sel.length?sel:['all'];
}

/* ── Links helpers ── */
function addLinkRow(sid,tid){
  const list=document.getElementById('links-list');if(!list)return;
  const i=list.querySelectorAll('.form-input').length/2;
  const div=document.createElement('div');div.style.cssText='display:flex;gap:6px;margin-bottom:6px';
  div.innerHTML=`<input class="form-input" style="flex:1" id="ll-${i}" placeholder="名稱">
    <input class="form-input" style="flex:2" id="lu-${i}" placeholder="https://…">
    <button class="btn btn-danger btn-sm" style="margin-right:0;padding:5px 8px" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(div);
}
function removeLink(sid,tid,idx){
  const s=getProject().sections.find(s=>s.id===sid);const t=s&&s.tasks.find(t=>t.id===tid);if(!t)return;
  t.links.splice(idx,1);cloudSave();openModal('editLinks',sid,tid);
}
function saveLinks(sid,tid){
  const s=getProject().sections.find(s=>s.id===sid);const t=s&&s.tasks.find(t=>t.id===tid);if(!t)return;
  const links=[];let i=0;
  while(true){const li=document.getElementById('ll-'+i);const lu=document.getElementById('lu-'+i);if(!li||!lu)break;if(lu.value.trim())links.push({id:genId(),label:li.value.trim()||lu.value.trim(),url:lu.value.trim()});i++;}
  t.links=links;cloudSave();closeModal();renderContent();
}

/* ── Submit handlers ── */
function submitNewProject(){const name=g('m-name').trim();if(!name)return;projects.push({id:genId(),name,type:g('m-type')||'審計',start:g('m-start')||'2025-01-01',end:g('m-end')||'2025-12-31',sections:[],findings:[],assignments:[],weeklyUpdates:[],archived:false,members:getProjMembers()});currentProject=projects.length-1;cloudSave();closeModal();renderContent();}
function submitEditProject(){const p=getProject();if(!p)return;p.name=g('m-name')||p.name;p.type=g('m-type')||p.type;p.start=g('m-start')||p.start;p.end=g('m-end')||p.end;p.members=getProjMembers();cloudSave();closeModal();renderContent();}
function deleteProject(){if(!confirm(`確認刪除「${getProject().name}」及其所有內容？`))return;projects.splice(currentProject,1);currentProject=Math.max(0,currentProject-1);cloudSave();closeModal();renderContent();}
function archiveProject(){
  const p=getProject();if(!p)return;
  if(p.archived){p.archived=false;cloudSave();closeModal();renderContent();return;}
  if(!confirm(`確認歸檔「${p.name}」？\n歸檔後可在標籤列點擊「📦」查看及恢復。`))return;
  p.archived=true;
  const firstActive=projects.findIndex(x=>!x.archived);
  currentProject=firstActive>=0?firstActive:0;
  cloudSave();closeModal();renderContent();
}

function submitNewSection(){const name=g('m-name').trim();if(!name)return;getProject().sections.push({id:genId(),name,color:g('m-color')||COLORS_10[0].hex,riskLevel:g('m-risk')||'med',summary:g('m-summary')||'',milestone:g('m-milestone')||'',open:true,tasks:[]});cloudSave();closeModal();renderContent();}
function submitEditSection(sid){const s=getProject().sections.find(s=>s.id===sid);if(!s)return;s.name=g('m-name')||s.name;s.color=g('m-color')||s.color;s.riskLevel=g('m-risk')||s.riskLevel;s.summary=g('m-summary');s.milestone=g('m-milestone');cloudSave();closeModal();renderContent();}
function deleteSection(sid){if(!confirm('確認刪除此版塊及所有任務？'))return;getProject().sections=getProject().sections.filter(s=>s.id!==sid);cloudSave();closeModal();renderContent();}

function submitNewTask(){const s=getProject().sections.find(s=>s.id===modalState.sid);if(!s)return;const name=g('m-name').trim();if(!name)return;s.tasks.push({id:genId(),name,assignee:g('m-assignee'),start:g('m-start')||'2025-01-01',end:g('m-end')||'2025-12-31',status:'todo',progress:0,notes:g('m-notes'),links:[],comments:[],subtasks:[]});cloudSave();closeModal();renderContent();}
function submitEditTask(){
  const s=getProject().sections.find(s=>s.id===modalState.sid);const t=s&&s.tasks.find(t=>t.id===modalState.tid);if(!t)return;
  t.name=g('m-name')||t.name;t.assignee=g('m-assignee')||t.assignee;t.start=g('m-start')||t.start;t.end=g('m-end')||t.end;t.status=g('m-status')||t.status;t.progress=parseInt(g('m-progress'))||0;t.notes=g('m-notes');
  const newSts=[];document.querySelectorAll('#subtask-list [id^="st-text-"]').forEach(inp=>{
    const text=inp.value.trim();if(!text)return;
    const i=inp.id.replace('st-text-','');
    const doneEl=document.getElementById('st-done-'+i);const idEl=document.getElementById('st-id-'+i);
    newSts.push({id:idEl?parseInt(idEl.value):genId(),text,done:doneEl?doneEl.checked:false});
  });
  t.subtasks=newSts;cloudSave();closeModal();renderContent();
}

═══════════════════════════════════ */
function buildAnalysisPrompt(p){
  const today=new Date().toISOString().slice(0,10);
  const done=doneTasks(p),total=totalTasks(p),prog=overallProgress(p);
  let taskDetails='';
  p.sections.forEach(s=>{
    const r=riskObj(s.riskLevel);
    taskDetails+=`\n【${s.name}】${r.label}${s.milestone?` 階段:${s.milestone}`:''} 完成率${sectionPct(s)}%`;
    s.tasks.forEach(t=>{
      const st=statusObj(t.status);const rk=calcTaskRisk(t);
      const rTag=rk==='overdue'?' ⚠️逾期':rk==='high'?' 🔴嚴重落後':rk==='med'?' 🟡滯後':'';
      const stInfo=t.subtasks&&t.subtasks.length?` 子任務${t.subtasks.filter(x=>x.done).length}/${t.subtasks.length}`:'';
      taskDetails+=`\n  • ${t.name}（${t.assignee}）：${st.label} ${t.progress}%${rTag}${stInfo} [${t.start}~${t.end}]`;
    });
  });
  const updates=(p.weeklyUpdates||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8);
  const updatesText=updates.length?updates.map(u=>`【${u.date} ${u.author}】\n摘要：${u.summary||'—'}\n完成：${u.completed||'—'}\n問題：${u.issues||'無'}\n下期：${u.nextSteps||'—'}`).join('\n\n'):'暫無周報記錄';
  let findingsText='';
  if(p.findings&&p.findings.length){
    const byF={};FOLLOW_STATUSES.forEach(f=>{byF[f.key]=0;});
    p.findings.forEach(f=>{byF[f.followStatus]=(byF[f.followStatus]||0)+1;});
    findingsText=`發現總數：${p.findings.length}（待跟進:${byF.pending} 跟進中:${byF.inprog} 已完成:${byF.done} 接受風險:${byF.accepted}）`;
    p.findings.forEach((f,i)=>{const r=riskObj(f.riskLevel);findingsText+=`\n  F-${String(i+1).padStart(3,'0')} [${r.label}] ${(f.description||'').slice(0,60)}`;});
  }else{findingsText='暫無審計發現記錄';}
  return`你是一位資深內部審計顧問。請根據以下「${p.name}」審計項目的完整數據，為管理層生成一份專業的審計進度分析報告。

**項目資訊**
- 名稱：${p.name}（${p.type}）
- 週期：${p.start} 至 ${p.end}
- 整體進度：${prog}%（${done}/${total} 任務完成）
- 分析日期：${today}

**任務明細**
${taskDetails}

**審計發現**
${findingsText}

**團隊周報記錄（最新8份）**
${updatesText}

請以繁體中文生成以下各節（Markdown格式，使用 ## 作二級標題）：

## 整體進度評估
分析項目整體健康度、按期完成的可能性。

## 主要風險與問題
列出當前最需要關注的風險點（逾期任務、落後版塊、跟進不足的發現等）。

## 周報摘要與分析
總結各同事的周報，識別共同阻礙或反覆出現的問題。

## 審計覆蓋缺口
識別哪些版塊或領域可能遺漏了重要審計步驟、發現記錄偏少或跟進不足。

## 行動建議
提出3-5項具體行動建議，按優先級排列。

請保持分析專業、直接、有針對性。`;
}
function renderMarkdownSimple(md){
  return`<div>`+md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>')
    +'</div>';
}
async function runProjectAnalysis(){
  const p=getProject();if(!p)return;
  const provider=localStorage.getItem('auditPM_aiProvider')||'';
  const geminiKey=localStorage.getItem('auditPM_geminiKey')||'';
  const zhipuKey=localStorage.getItem('auditPM_zhipuKey')||'';
  if(!provider||(provider==='gemini'&&!geminiKey)||(provider==='zhipu'&&!zhipuKey)){
    alert('請先在「🤖 AI 設定」中配置 AI 服務及 API 密鑰');return;
  }
  const btn=document.getElementById('ai-analysis-run-btn');
  const content=document.getElementById('ai-analysis-content');
  if(btn){btn.disabled=true;btn.textContent='⏳ 分析中…';}
  if(content)content.innerHTML='<div style="padding:20px;text-align:center;color:#888780">🤖 AI 正在分析項目數據，請稍候…</div>';
  try{
    const prompt=buildAnalysisPrompt(p);
    let result;
    if(provider==='gemini')result=await callGemini(prompt,geminiKey,localStorage.getItem('auditPM_geminiModel')||'gemini-2.0-flash');
    else result=await callZhipu(prompt,zhipuKey,localStorage.getItem('auditPM_zhipuModel')||'glm-4-flash');
    window._lastAnalysisResult=result;
    window._lastAnalysisProject=p.name;
    if(content)content.innerHTML=renderMarkdownSimple(result);
    ['ai-export-md-btn','ai-print-btn'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  }catch(e){
    if(content)content.innerHTML=`<div style="padding:16px;color:#A32D2D">❌ 分析失敗：${escHtml(e.message)}</div>`;
  }finally{
    if(btn){btn.disabled=false;btn.textContent='🔄 重新分析';}
  }
}

async function callGemini(prompt,key,model){
  const m=model||'gemini-2.0-flash';
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(m)}:generateContent?key=${encodeURIComponent(key)}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:4096}})
  });
  if(!res.ok){const t=await res.text();throw new Error('Gemini '+res.status+': '+t.slice(0,120));}
  const j=await res.json();
  const text=j.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text)throw new Error('Gemini 無回應內容');
  return text;
}
async function callZhipu(prompt,key,model){
  const m=model||'glm-4-flash';
  const res=await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:m,messages:[{role:'user',content:prompt}],temperature:0.7,max_tokens:4096})
  });
  if(!res.ok){const t=await res.text();throw new Error('Zhipu '+res.status+': '+t.slice(0,120));}
  const j=await res.json();
  const text=j.choices?.[0]?.message?.content;
  if(!text)throw new Error('Zhipu 無回應內容');
  return text;
}

  const ws2=XLSX.utils.aoa_to_sheet(riskRows);ws2['!cols']=[{wch:16},{wch:8},{wch:30},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws2,'風險評估');
  if(p.findings&&p.findings.length){const fRows=[['編號','版塊','風險水平','發現描述','審計建議','管理層回覆','責任人','整改期限','跟進狀態']];p.findings.forEach((f,i)=>{const r=riskObj(f.riskLevel);const fo=followObj(f.followStatus);fRows.push([`F-${String(i+1).padStart(3,'0')}`,f.sectionName,r.label,f.description||'',f.recommendation||'',f.mgmtReply||'',f.assignee||'',f.deadline||'',fo.label]);});const ws3=XLSX.utils.aoa_to_sheet(fRows);ws3['!cols']=[{wch:8},{wch:14},{wch:8},{wch:30},{wch:28},{wch:24},{wch:10},{wch:12},{wch:10}];XLSX.utils.book_append_sheet(wb,ws3,'審計發現');}
  const fname=`${p.name}_${new Date().toISOString().slice(0,10)}.xlsx`;XLSX.writeFile(wb,fname);
}
